<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 1280px; overflow: hidden;
    background: #0a0a1a;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    font-family: 'Segoe UI', sans-serif; color: white;
    padding: 60px 40px;
  }
  .step-header {
    font-size: 22px; color: {{ primary_color }}; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .concept-title {
    font-size: 52px; font-weight: 900; text-align: center;
    color: white; line-height: 1.2; margin-bottom: 30px;
  }
  .explanation-box {
    background: rgba(255,255,255,0.04);
    border: 2px solid {{ primary_color }};
    border-radius: 30px; padding: 40px;
    font-size: 32px; line-height: 1.7; color: #ddd;
    text-align: center; margin-bottom: 40px;
    width: 100%;
  }
  .equation-box {
    background: #000;
    border: 3px solid {{ secondary_color }};
    border-radius: 20px; padding: 50px;
    font-size: 52px; font-family: 'Courier New', monospace;
    color: {{ secondary_color }};
    text-align: center; width: 100%;
    box-shadow: 0 0 50px {{ secondary_color }}44;
    line-height: 1.5;
    word-break: break-all;
  }
  .label {
    font-size: 22px; color: #777; text-align: center;
    margin-top: 20px; letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="step-header">📐 Concept</div>
  <div class="concept-title">{{ topic }}</div>
  <div class="explanation-box">{{ explanation }}</div>
  <div class="equation-box">{{ equation }}</div>
  <div class="label">Main Formula / Equation</div>
</body>
</html>
