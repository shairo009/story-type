<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Advanced 3D MathMagic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .ui-overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 60px 0; color: white; text-align: center;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 40px; width: 80%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            animation: float 6s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        
        .level-badge {
            background: {{ primary_color }};
            padding: 10px 25px; border-radius: 20px; font-weight: bold; font-size: 20px;
            margin-bottom: 20px; display: inline-block; box-shadow: 0 0 20px {{ primary_color }};
        }
        h1 { font-size: 50px; margin: 0; color: {{ secondary_color }}; text-shadow: 0 0 30px {{ secondary_color }}; }
        .logic-box { font-size: 28px; line-height: 1.6; margin-top: 30px; color: #ddd; }
        .graph-container { width: 100%; height: 300px; margin-top: 30px; position: relative; }
        .equation { font-size: 60px; font-family: 'Courier New', Courier, monospace; color: #fff; margin: 40px 0; }
        .cta { font-size: 32px; font-weight: bold; color: {{ primary_color }}; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <div class="glass-panel">
            <div class="level-badge">{{ level }}</div>
            <h1>{{ title }}</h1>
            <div class="logic-box">{{ explanation }}</div>
            
            <div class="graph-container">
                <canvas id="mathChart"></canvas>
            </div>

            <div class="equation">{{ equation }}</div>
        </div>
        <div class="cta">Kaisi lagi ye trick? SUBSCRIBE karein!</div>
    </div>

    <script>
        // --- THREE.JS 3D BACKGROUND ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 720/1280, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(720, 1280);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Add 3D Geometric Shape
        const geometry = new THREE.IcosahedronGeometry(2, 0);
        const material = new THREE.MeshPhongMaterial({ 
            color: '{{ primary_color }}', 
            wireframe: true, 
            emissive: '{{ primary_color }}',
            emissiveIntensity: 0.5 
        });
        const shape = new THREE.Mesh(geometry, material);
        scene.add(shape);

        // Lights
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            shape.rotation.x += 0.01;
            shape.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // --- CHART.JS GRAPH ---
        const ctx = document.getElementById('mathChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({length: 10}, (_, i) => i),
                datasets: [{
                    label: '{{ graph_label }}',
                    data: {{ graph_data }},
                    borderColor: '{{ secondary_color }}',
                    backgroundColor: 'rgba(0, 255, 255, 0.1)',
                    borderWidth: 5,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { x: { display: false }, y: { display: false } },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
