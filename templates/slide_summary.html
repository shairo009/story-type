<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720px; height: 1280px; overflow: hidden;
    background: radial-gradient(circle at center, #1a0533 0%, #0d0d2b 60%, #000 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif; color: white; text-align: center;
    padding: 60px 40px;
  }
  .check { font-size: 120px; margin-bottom: 20px; }
  .title { font-size: 56px; font-weight: 900; color: {{ primary_color }}; text-shadow: 0 0 40px {{ primary_color }}; margin-bottom: 30px; }
  .summary-box {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 30px; padding: 40px;
    font-size: 28px; line-height: 1.7; color: #ccc;
    margin-bottom: 40px; width: 100%;
  }
  .next-preview {
    background: rgba(255,255,255,0.08);
    border: 2px solid {{ secondary_color }};
    border-radius: 20px; padding: 25px 40px;
    font-size: 24px; color: {{ secondary_color }};
    margin-bottom: 40px; width: 100%;
  }
  .cta-box {
    background: {{ primary_color }};
    border-radius: 50px; padding: 30px 60px;
    font-size: 40px; font-weight: 900; color: #000;
    box-shadow: 0 0 60px {{ primary_color }};
    animation: glow 2s infinite;
  }
  @keyframes glow {
    0%, 100% { box-shadow: 0 0 40px {{ primary_color }}; }
    50% { box-shadow: 0 0 80px {{ primary_color }}; }
  }
</style>
</head>
<body>
  <div class="check">✅</div>
  <div class="title">Aaj Humne Sikha!</div>
  <div class="summary-box">{{ summary }}</div>
  <div class="next-preview">⏭ Agli video mein: {{ next_topic }}</div>
  <div class="cta-box">🔔 SUBSCRIBE Karo!</div>
</body>
</html>
