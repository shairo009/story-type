name: Dry Run Check

on:
  workflow_dispatch:

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get install -y imagemagick ffmpeg
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure ImageMagick
        run: |
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
          sudo sed -i 's/rights="none" pattern="LABEL"/rights="read|write" pattern="LABEL"/' /etc/ImageMagick-6/policy.xml

      - name: Run Dry Run
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        run: |
          python dry_run.py

      - name: Upload dry run video as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-video-${{ github.run_number }}
          path: outputs/DRY_RUN_*.mp4
          retention-days: 3
          if-no-files-found: warn
